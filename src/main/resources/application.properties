spring.datasource.url=jdbc:sqlite:./data/local-document-assistant.sqlite
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1
spring.sql.init.mode=never

ollama.base-url=http://localhost:11434
ollama.embedding-model=nomic-embed-text
ollama.chat-model=qwen3:8b

chroma.base-url=http://127.0.0.1:8000
chroma.tenant=default_tenant
chroma.database=default_database
chroma.collection-name=local_document_chunks

ingestion.text-extraction.max-characters=200000
ingestion.text-extraction.timeout=30s
